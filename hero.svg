<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420">
  <defs>
    <!-- fire glow filters -->
    <filter id="g1" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="b"/>
      <feFlood flood-color="#ff7744" flood-opacity="1" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="r"/>
      <feMerge><feMergeNode in="r"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g2" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/>
      <feFlood flood-color="#ff2200" flood-opacity="0.9" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="r"/>
      <feMerge><feMergeNode in="r"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g3" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="b"/>
      <feFlood flood-color="#cc1100" flood-opacity="0.65" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="r"/>
      <feMerge><feMergeNode in="r"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g4" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="26" result="b"/>
      <feFlood flood-color="#880000" flood-opacity="0.4" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="r"/>
      <feMerge><feMergeNode in="r"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="g5" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="45" result="b"/>
      <feFlood flood-color="#440000" flood-opacity="0.3" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="r"/>
      <feMerge><feMergeNode in="r"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- text glow -->
    <filter id="textglow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="b"/>
      <feFlood flood-color="#cc2200" flood-opacity="0.7" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="r"/>
      <feMerge><feMergeNode in="r"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtextglow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="b"/>
      <feFlood flood-color="#880000" flood-opacity="0.6" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="r"/>
      <feMerge><feMergeNode in="r"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- fade mask — bat fades bottom into black -->
    <mask id="batmask">
      <linearGradient id="batfade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
        <stop offset="35%" stop-color="white" stop-opacity="0.28"/>
        <stop offset="65%" stop-color="white" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="white" stop-opacity="0"/>
      </linearGradient>
      <rect width="1200" height="420" fill="url(#batfade)"/>
    </mask>
  </defs>

  <!-- BLACK BACKGROUND -->
  <rect width="1200" height="420" fill="#000000"/>

  <!-- subtle top red gradient -->
  <rect width="1200" height="3" y="0" fill="url(#toprule)"/>
  <defs>
    <linearGradient id="toprule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="20%" stop-color="#550000"/>
      <stop offset="50%" stop-color="#8b0000"/>
      <stop offset="80%" stop-color="#550000"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="botrule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="20%" stop-color="#550000"/>
      <stop offset="50%" stop-color="#8b0000"/>
      <stop offset="80%" stop-color="#550000"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="3" y="417" fill="url(#botrule)"/>

  <!-- BAT LOGO — centered, ghosted behind text -->

    <path fill="#000" stroke="#ff3300" stroke-width="2.5" filter="url(#g2)" d="M483.92 4S481.38 28.71 466 44.11c-11.74 11.74-24.09 12.66-40.26 15.07-9.42 1.41-29.7 3.77-34.81-.79-2.37-2.11-3-21-3.22-27.62-.21-6.92-1.36-16.52-2.82-18-.75 3.06-2.49 11.53-3.09 13.61S378.49 38.3 378 40a85.13 85.13 0 0 0-30.09 0c-.46-1.67-3.17-11.48-3.77-13.56s-2.34-10.55-3.09-13.61c-1.45 1.45-2.61 11.05-2.82 18-.21 6.67-.84 25.51-3.22 27.62-5.11 4.56-25.38 2.2-34.8.79-16.16-2.47-28.51-3.39-40.21-15.13C244.57 28.71 242 4 242 4H0s69.52 22.74 97.52 68.59c16.56 27.11 14.14 58.49 9.92 74.73C170 144 221.46 144 273 162.57c69.23 24.93 83.2 76.19 90 93.6 6.77-17.41 20.75-68.67 90-93.6 51.54-18.56 103-18.59 165.56-15.25-4.21-16.24-6.63-47.62 9.93-74.73C656.43 26.74 726 4 726 4z"/>
    <path fill="#000" stroke="#ff7744" stroke-width="1" filter="url(#g1)" d="M483.92 4S481.38 28.71 466 44.11c-11.74 11.74-24.09 12.66-40.26 15.07-9.42 1.41-29.7 3.77-34.81-.79-2.37-2.11-3-21-3.22-27.62-.21-6.92-1.36-16.52-2.82-18-.75 3.06-2.49 11.53-3.09 13.61S378.49 38.3 378 40a85.13 85.13 0 0 0-30.09 0c-.46-1.67-3.17-11.48-3.77-13.56s-2.34-10.55-3.09-13.61c-1.45 1.45-2.61 11.05-2.82 18-.21 6.67-.84 25.51-3.22 27.62-5.11 4.56-25.38 2.2-34.8.79-16.16-2.47-28.51-3.39-40.21-15.13C244.57 28.71 242 4 242 4H0s69.52 22.74 97.52 68.59c16.56 27.11 14.14 58.49 9.92 74.73C170 144 221.46 144 273 162.57c69.23 24.93 83.2 76.19 90 93.6 6.77-17.41 20.75-68.67 90-93.6 51.54-18.56 103-18.59 165.56-15.25-4.21-16.24-6.63-47.62 9.93-74.73C656.43 26.74 726 4 726 4z"/>
  </g>

  <!-- NAME ON TOP — letter spaced, fire glowing -->
  <text x="600" y="210"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="bold"
    letter-spacing="12"
    text-anchor="middle"
    fill="#cc2200"
    filter="url(#textglow)">PODILAPU MUKESH RAJU</text>

  <!-- thin red rule under name -->
  <line x1="200" y1="232" x2="1000" y2="232" stroke="#550000" stroke-width="0.8" opacity="0.8"/>

  <!-- SUBTITLE -->
  <text x="600" y="268"
    font-family="'Courier New', Courier, monospace"
    font-size="16"
    letter-spacing="5"
    text-anchor="middle"
    fill="#661111"
    filter="url(#subtextglow)">DEVELOPER  ·  AI/ML ENGINEER IN THE MAKING  ·  INTEGRATED M.TECH CSE</text>
</svg>
